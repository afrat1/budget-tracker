name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Budget commit'i GITHUB_TOKEN ile gelince push deploy tetiklemez
  workflow_run:
    workflows: ["Update Budget Data"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Hızlı ardışık kayıtlarda eski deploy iptal; sadece en son build yayınlanır
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log deploy context
        run: |
          echo "=== Deploy build context ==="
          echo "event=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"
          echo "sha=${{ github.sha }}"
          echo "ref=${{ github.ref }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "triggered_by_workflow=${{ github.event.workflow_run.name }}"
            echo "triggered_by_run_id=${{ github.event.workflow_run.id }}"
            echo "triggered_by_conclusion=${{ github.event.workflow_run.conclusion }}"
            echo "triggered_by_sha=${{ github.event.workflow_run.head_sha }}"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create .nojekyll file
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Log build artifact
        run: |
          echo "Artifact path: ./out"
          echo "File count: $(find out -type f | wc -l)"
          du -sh out || true

  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url || steps.deployment-retry-2.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Log deploy job context
        run: |
          echo "=== Deploy job context ==="
          echo "event=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "sha=${{ github.sha }}"
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
        continue-on-error: true

      - name: Log first deploy attempt
        if: always()
        run: |
          echo "First deploy outcome: ${{ steps.deployment.outcome }}"
          if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
            echo "page_url=${{ steps.deployment.outputs.page_url }}"
          fi
          if [ "${{ steps.deployment.outcome }}" = "failure" ]; then
            echo "::warning::First Pages deploy failed — often caused by another in-flight deployment."
          fi

      - name: Wait for in-flight deployment to settle
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "Waiting 90s before retry #1..."
          sleep 90

      - name: Deploy to GitHub Pages (retry 1)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
        continue-on-error: true

      - name: Log retry 1
        if: steps.deployment.outcome == 'failure' && always()
        run: |
          echo "Retry 1 outcome: ${{ steps.deployment-retry.outcome }}"
          if [ -n "${{ steps.deployment-retry.outputs.page_url }}" ]; then
            echo "page_url=${{ steps.deployment-retry.outputs.page_url }}"
          fi

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: |
          echo "Waiting 90s before retry #2..."
          sleep 90

      - name: Deploy to GitHub Pages (retry 2)
        id: deployment-retry-2
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000

      - name: Log final deploy result
        if: always()
        run: |
          echo "=== Deploy summary ==="
          echo "attempt_1=${{ steps.deployment.outcome }}"
          echo "attempt_2=${{ steps.deployment-retry.outcome }}"
          echo "attempt_3=${{ steps.deployment-retry-2.outcome }}"
          SUCCESS=false
          if [ "${{ steps.deployment.outcome }}" = "success" ]; then SUCCESS=true; fi
          if [ "${{ steps.deployment-retry.outcome }}" = "success" ]; then SUCCESS=true; fi
          if [ "${{ steps.deployment-retry-2.outcome }}" = "success" ]; then SUCCESS=true; fi
          echo "final_success=$SUCCESS"
          if [ "$SUCCESS" = "false" ]; then
            echo "::error::All Pages deploy attempts failed for run ${{ github.run_id }} (sha ${{ github.sha }})"
          fi

      - name: Verify deployment succeeded
        if: steps.deployment.outcome != 'success' && steps.deployment-retry.outcome != 'success' && steps.deployment-retry-2.outcome != 'success'
        run: |
          echo "Deploy failed after 3 attempts."
          echo "Check Actions logs above and GitHub Pages settings for repo ${{ github.repository }}."
          exit 1
