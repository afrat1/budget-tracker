name: Update Budget Data

on:
  repository_dispatch:
    types: [update-budget]
  workflow_dispatch:
    inputs:
      data_b64:
        description: 'Budget JSON (base64)'
        required: true

permissions:
  contents: write

concurrency:
  group: update-budget
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update budget.json
        env:
          DATA_B64: ${{ github.event.client_payload.data_b64 || github.event.inputs.data_b64 }}
        run: |
          echo "=== Update budget context ==="
          echo "run_id=${{ github.run_id }}"
          echo "event=${{ github.event_name }}"
          if [ -z "$DATA_B64" ] || [ "$DATA_B64" = "null" ]; then
            echo "No data provided, skipping update"
            exit 0
          fi
          printf '%s' "$DATA_B64" | base64 -d > public/budget.json
          cp public/budget.json data/budget.json
          python3 -c "import json; json.load(open('public/budget.json'))"
          echo "Budget files updated ($(wc -c < public/budget.json) bytes)"

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/budget.json data/budget.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data already matches main)"
            exit 0
          fi
          git commit -m "Update budget data"
          echo "Pulling latest main before push..."
          if ! git pull --rebase origin main; then
            echo "::error::git pull --rebase failed — possible concurrent update conflict"
            git status
            exit 1
          fi
          echo "Pushing to main..."
          if ! git push origin main; then
            echo "::error::git push failed"
            exit 1
          fi
          echo "Pushed to main — deploy workflow will run via workflow_run"

